services:
  postgres:
    image: postgres:17
    container_name: automatic_kyc_postgres
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER:-automatic_kyc}", "-d", "${POSTGRES_DB:-automatic_kyc_db}" ]
      interval: 10s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-automatic_kyc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-automatic_kyc_password}
      POSTGRES_DB: ${POSTGRES_DB:-automatic_kyc_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - automatic_kyc_postgres_data:/var/lib/postgresql/data
    networks:
      - automatic_kyc_network
  rabbitmq:
    image: rabbitmq:3.10-management
    container_name: automatic_kyc_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-mysecretcookie}
      # Enable Prometheus metrics
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_prometheus true"
    ports:
      - "${RABBITMQ_PORT:-5671}:5671"         # AMQPS client connections (TLS)
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"   # Management UI
      - "${RABBITMQ_PROMETHEUS_PORT:-15692}:15692"   # Prometheus metrics
    volumes:
      - automatic_kyc_rabbitmq_data:/var/lib/rabbitmq
      - automatic_kyc_rabbitmq_logs:/var/log/rabbitmq
      - ./ops/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./ops/rabbitmq/certs:/etc/rabbitmq/certs:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "status" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - automatic_kyc_network

  minio:
    image: minio/minio
    container_name: automatic_kyc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"    # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"   # Web console
    volumes:
      - automatic_kyc_minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`${MINIO_HOST:-minio.localhost}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.service=minio"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`${MINIO_CONSOLE_HOST:-minio-console.localhost}`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - automatic_kyc_network

  minio-init:
    image: minio/mc
    container_name: automatic_kyc_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio-policy.json:/tmp/minio-policy.json
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/automatic-kyc-localhost &&
        mc anonymous set-json /tmp/minio-policy.json local/automatic-kyc-localhost &&
        echo 'MinIO setup complete'
      "
    networks:
      - automatic_kyc_network

  worker:
    build:
      context: ./worker
    container_name: automatic_kyc_worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      AMQP_URL: amqps://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5671
      AMQP_MTLS_ENABLED: "true"
      AMQP_CA_FILE: /certs/ca.crt
      AMQP_CLIENT_CERT_FILE: /certs/client.crt
      AMQP_CLIENT_KEY_FILE: /certs/client.key
      AMQP_TLS_INSECURE: "false"
      WORKER_TYPE: ${WORKER_TYPE:-kyc_worker}
      PREFETCH: ${PREFETCH:-1}
    volumes:
      - ./ops/worker/certs:/certs:ro
    networks:
      - automatic_kyc_network

  traefik:
    image: traefik:v3.3
    container_name: automatic_kyc_traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=automatic_kyc_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
    ports:
      - "80:80"
      - "443:443"
      - "8088:8080"   # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./ops/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro"
      - "./ops/traefik/certs:/certs:ro"
    networks:
      - automatic_kyc_network

  api:
    build:
      context: ./api
    container_name: automatic_kyc_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-automatic_kyc_db}
      DATABASE_USERNAME: ${POSTGRES_USER:-automatic_kyc}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-automatic_kyc_password}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5671
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_SSL_ENABLED: "true"
      RABBITMQ_SSL_VERIFY_HOSTNAME: "true"
      RABBITMQ_TRUSTSTORE_PATH: /certs/api-truststore.p12
      RABBITMQ_TRUSTSTORE_PASSWORD: ${RABBITMQ_TRUSTSTORE_PASSWORD:-}
      RABBITMQ_TRUSTSTORE_TYPE: PKCS12
      RABBITMQ_KEYSTORE_PATH: /certs/api-keystore.p12
      RABBITMQ_KEYSTORE_PASSWORD: ${RABBITMQ_KEYSTORE_PASSWORD:-}
      RABBITMQ_KEYSTORE_TYPE: PKCS12
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-automatic-kyc-localhost}
      S3_ENDPOINT: http://minio:9000
      S3_WORKER_PRESIGN_ENDPOINT: ${S3_WORKER_PRESIGN_ENDPOINT:-http://localhost:9000}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/automatic-kyc-localhost}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ISSUER: ${JWT_ISSUER:-automatic-kyc}
      KYC_FLOW_BASE_URL: ${KYC_FLOW_BASE_URL:-http://verify.localhost/v}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://admin.localhost,http://verify.localhost}
      APP_ENV: ${APP_ENV:-dev}
      APP_ENCRYPTION_MASTER_KEY: ${APP_ENCRYPTION_MASTER_KEY:-}
    volumes:
      - ./ops/api/certs:/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST:-api.localhost}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - automatic_kyc_network

  admin:
    build:
      context: ./admin
      args:
        VITE_API_URL: ${VITE_ADMIN_API_URL:-http://api.localhost}
        VITE_WS_URL: ${VITE_ADMIN_WS_URL:-ws://api.localhost}
    container_name: automatic_kyc_admin
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${ADMIN_HOST:-admin.localhost}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    networks:
      - automatic_kyc_network

  verify:
    build:
      context: ./verify
      args:
        VITE_API_BASE_URL: ${VITE_VERIFY_API_BASE_URL:-http://api.localhost}
    container_name: automatic_kyc_verify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.verify.rule=Host(`${VERIFY_HOST:-verify.localhost}`)"
      - "traefik.http.routers.verify.entrypoints=websecure"
      - "traefik.http.services.verify.loadbalancer.server.port=80"
    networks:
      - automatic_kyc_network

volumes:
  automatic_kyc_postgres_data:
  automatic_kyc_rabbitmq_data:
  automatic_kyc_rabbitmq_logs:
  automatic_kyc_minio_data:

networks:
  automatic_kyc_network:
